<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>HAKA</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
color:white;

background-image:url("fundo.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.logo{
margin-top:40px;
}

.logo img{
width:420px;
max-width:90%;
}

.carousel{
margin-top:60px;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
}

.card{
width:320px;
height:420px;
background:rgba(0,0,0,0.6);
border-radius:15px;
padding:15px;

transition:0.4s;

transform:scale(0.9);
opacity:0.6;
}

.card:hover{
cursor:pointer;
}

.card iframe{
width:100%;
height:250px;
border:none;
border-radius:10px;
}

.center{
transform:scale(1.2);
opacity:1;
}

.contador{
font-size:18px;
margin-bottom:10px;
}

.subs{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="logo">
<img src="logo-haka.png">
</div>


<div class="carousel">

<div class="card" id="youtube">

<div class="contador">
YouTube
</div>

<iframe src="https://www.youtube.com/embed?listType=user_uploads&list=cortesdohaka6146"></iframe>

</div>



<div class="card center" id="kick">

<div class="contador">
Kick
</div>

<iframe src="https://player.kick.com/hakanaidesu"></iframe>

<div class="subs">
Subs do canal
</div>

</div>



<div class="card" id="instagram">

<div class="contador">
Instagram
</div>

<iframe src="https://www.instagram.com/raphael.melo.s/embed"></iframe>

</div>

</div>


<script>

let cards = document.querySelectorAll(".card");

cards.forEach((card)=>{

card.addEventListener("mouseenter",()=>{

cards.forEach(c=>c.classList.remove("center"));

card.classList.add("center");

});

});

</script>

</body>
</html>
