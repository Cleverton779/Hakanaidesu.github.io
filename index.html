<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>HAKA</title>

<style>

body{
    margin:0;
    font-family:Arial;
    text-align:center;
    color:white;

    background-image:url("fundo.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.logo{
    margin-top:40px;
}

.logo img{
    width:400px;
}

.carousel{
    margin-top:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    transition:0.5s;
}

.card{
    width:320px;
    height:420px;
    background:rgba(0,0,0,0.6);
    border-radius:15px;
    padding:15px;
    transition:0.5s;
}

.card iframe{
    width:100%;
    height:250px;
    border:none;
    border-radius:10px;
}

.center{
    transform:scale(1.2);
}

.contador{
    font-size:18px;
    margin-bottom:10px;
}

.subs{
    margin-top:10px;
    font-size:14px;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="logo">
<img src="logo-haka.png">
</div>

<div class="carousel" id="carousel">

<div class="card" id="youtube">
<div class="contador">YouTube: carregando...</div>

<iframe src="https://www.youtube.com/embed?listType=user_uploads&list=cortesdohaka6146"></iframe>

</div>


<div class="card center" id="kick">

<div class="contador">Kick: carregando...</div>

<iframe src="https://player.kick.com/hakanaidesu"></iframe>

<div class="subs">Subs: carregando...</div>

</div>


<div class="card" id="instagram">

<div class="contador">Instagram: carregando...</div>

<iframe src="https://www.instagram.com/raphael.melo.s/embed"></iframe>

</div>

</div>

<script>

let cards = document.querySelectorAll(".card");
let centerIndex = 1;

function updateCarousel(){
    cards.forEach((card,i)=>{
        card.classList.remove("center");
        if(i === centerIndex){
            card.classList.add("center");
        }
    });
}

document.addEventListener("wheel", (e)=>{

    if(e.deltaY > 0){
        centerIndex++;
    }else{
        centerIndex--;
    }

    if(centerIndex < 0) centerIndex = cards.length-1;
    if(centerIndex >= cards.length) centerIndex = 0;

    updateCarousel();

});

</script>

</body>
</html>
