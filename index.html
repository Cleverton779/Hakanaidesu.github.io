<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAKA</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

header{
padding:30px;
font-size:32px;
font-weight:bold;
background:#020617;
letter-spacing:2px;
}

.carousel-container{
position:relative;
width:100%;
overflow:hidden;
margin-top:60px;
}

.carousel{
display:flex;
transition:transform 0.6s ease;
align-items:center;
}

.card{
min-width:300px;
margin:0 20px;
background:#020617;
padding:20px;
border-radius:12px;
transform:scale(0.8);
opacity:0.5;
transition:all 0.6s ease;
}

.card.active{
transform:scale(1.1);
opacity:1;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
cursor:pointer;
user-select:none;
padding:10px;
}

.arrow:hover{
color:#3b82f6;
}

.left{
left:20px;
}

.right{
right:20px;
}

footer{
margin-top:80px;
padding:20px;
background:#020617;
}

</style>

</head>

<body>

<header>
HAKA
</header>

<div class="carousel-container">

<div class="arrow left" onclick="move(-1)">❮</div>

<div class="carousel" id="carousel">

<div class="card active">

<h2>Kick</h2>

<iframe src="https://player.kick.com/hakanaidesu"></iframe>

</div>

<div class="card">

<h2>YouTube</h2>

<iframe src="https://www.youtube.com/embed?listType=user_uploads&list=cortesdohaka6146"></iframe>

</div>

<div class="card">

<h2>Instagram</h2>

<a href="https://instagram.com/raphael.melo.s" target="_blank">
Abrir Instagram
</a>

</div>

</div>

<div class="arrow right" onclick="move(1)">❯</div>

</div>

<footer>
© 2026 HAKA • Criado por Cleverton
</footer>

<script>

let index = 0
const carousel = document.getElementById("carousel")
const cards = document.querySelectorAll(".card")

function update(){

cards.forEach(card=>card.classList.remove("active"))

cards[index].classList.add("active")

const offset = -index * 340 + window.innerWidth/2 - 170

carousel.style.transform = `translateX(${offset}px)`

}

function move(direction){

index += direction

if(index < 0){
index = cards.length - 1
}

if(index >= cards.length){
index = 0
}

update()

}

update()

</script>

</body>
</html>
