<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>HAKA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

background:url("fundo.png");
background-size:cover;
background-position:center;
background-attachment:fixed;

}

/* overlay escuro */

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.6);

z-index:-1;

}

/* logo */

.logo{

margin-top:50px;

animation:glow 3s infinite alternate;

}

.logo img{

width:420px;
max-width:90%;

}

@keyframes glow{

from{
filter:drop-shadow(0 0 10px orange);
}

to{
filter:drop-shadow(0 0 30px red);
}

}

/* carrossel */

.carousel{

margin-top:80px;

display:flex;
justify-content:center;
align-items:center;

gap:40px;

flex-wrap:wrap;

}

/* cards */

.card{

width:320px;
height:420px;

border-radius:20px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.2);

padding:15px;

transition:0.4s;

transform:scale(0.85);

opacity:0.6;

}

.card:hover{

cursor:pointer;

}

.center{

transform:scale(1.2);

opacity:1;

}

/* titulo */

.titulo{

font-size:20px;

margin-bottom:10px;

font-weight:bold;

letter-spacing:1px;

}

/* iframe */

.card iframe{

width:100%;
height:250px;

border:none;

border-radius:10px;

}

/* contador */

.contador{

margin-bottom:10px;

font-size:16px;

opacity:0.8;

}

/* subs */

.subs{

margin-top:10px;

font-size:14px;

opacity:0.7;

}

/* responsivo */

@media (max-width:900px){

.carousel{

flex-direction:column;

}

.card{

transform:scale(1);

opacity:1;

}

.center{

transform:scale(1.05);

}

}

</style>
</head>

<body>

<div class="logo">
<img src="logo-haka.png">
</div>


<div class="carousel">

<div class="card" id="youtube">

<div class="titulo">YOUTUBE</div>

<div class="contador">
Canal de cortes
</div>

<iframe src="https://www.youtube.com/embed?listType=user_uploads&list=cortesdohaka6146"></iframe>

</div>



<div class="card center" id="kick">

<div class="titulo">KICK</div>

<div class="contador">
Lives
</div>

<iframe src="https://player.kick.com/hakanaidesu"></iframe>

<div class="subs">
Canal hakanaidesu
</div>

</div>



<div class="card" id="instagram">

<div class="titulo">INSTAGRAM</div>

<div class="contador">
Perfil oficial
</div>

<iframe src="https://www.instagram.com/raphael.melo.s/embed"></iframe>

</div>

</div>


<script>

let cards = document.querySelectorAll(".card");

cards.forEach((card)=>{

card.addEventListener("mouseenter",()=>{

cards.forEach(c=>c.classList.remove("center"));

card.classList.add("center");

});

});

</script>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Haka</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- seu site inteiro -->
  <header>
    <img src="logo-haka.png" alt="Haka Logo">
  </header>

  <section>
    <!-- conteúdo -->
  </section>


  <!-- MÚSICA DE FUNDO -->
  <div class="bg-music">
    <iframe
      src="https://www.youtube.com/embed/62Vjm0UGfv8?autoplay=1&loop=1&playlist=62Vjm0UGfv8&controls=0&mute=1"
      frameborder="0"
      allow="autoplay">
    </iframe>
  </div>

  <style>
    .bg-music iframe{
      position: fixed;
      width: 0;
      height: 0;
      border: 0;
    }
  </style>

</body>
</html>
